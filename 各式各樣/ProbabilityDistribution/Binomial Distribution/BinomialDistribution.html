<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:locale" content="zh_TW" />
    <meta name="description" content="二項分佈機率表 (Binomial Distribution Table), this site created by wayne931121 and gemini. About Me: name wayne931121, github https://github.com/wayne931121 .">
    <title>二項分佈機率表 (Binomial Distribution Table)</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; }
        .input-group { margin-bottom: 20px; background: #f4f4f4; padding: 15px; border-radius: 8px; }
        label { margin-right: 10px; font-weight: bold; }
        input { padding: 5px; margin-right: 20px; width: 80px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .summary { margin-top: 10px; font-style: italic; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>二項分佈機率表生成器</h1>
    
    <div class="input-group">
        <label for="n-input">試驗次數 (n):</label>
        <input type="number" id="n-input" value="10" min="1" max="100">
        
        <label for="p-input">成功機率 (p):</label>
        <input type="number" id="p-input" value="0.5" min="0" max="1" step="0.01">
        
        <button onclick="generateTable()">生成表格</button>
    </div>

    <div id="result-area">
	    <div class="summary" id="ProbabilityMassFunction">
		機率質量函數PMF: C(Total,M)*(SuccessProbability**M)*(FailedProbability**(Total-M))
		</div>
        <div class="summary" id="stats-summary"></div>
        <table id="distribution-table">
            <thead>
                <tr>
                    <th>成功次數 (k)</th>
                    <th>機率 P(X = k)</th>
                    <th>累積機率 P(X ≤ k)</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>
<script src="../ProbabilityDistribution.js"></script>
<script>
    function generateTable() {
        const n = parseInt(document.getElementById('n-input').value);
        const p = parseFloat(document.getElementById('p-input').value);
        const tbody = document.querySelector('#distribution-table tbody');
        const summary = document.getElementById('stats-summary');
        
        // 清空舊數據
        tbody.innerHTML = '';

        if (isNaN(n) || isNaN(p) || p < 0 || p > 1 || n < 0) {
            alert("請輸入正確的 n (正整數) 與 p (0~1 之間)");
            return;
        }

        let cumulativeP = 0;
		const PMF = BinomialDistributionProbabilityMassFunction;
        const mean = ExpectedValue(PMF,[n,p,1-p],0,n).toFixed(2);
        const variance = Variance(PMF,[n,p,1-p],0,n).toFixed(2);
		const stdev = StandardDeviation(PMF,[n,p,1-p],0,n).toFixed(2);

        summary.innerHTML = `期望值 (E[X]): ${mean} | 變異數 (Var[X]): ${variance} | 標準差 (STDEV[X]): ${stdev}`;

        for (let k = 0; k <= n; k++) {
            const prob = BinomialDistributionProbabilityMassFunction(n,p,1-p,k);
            cumulativeP += prob;

            const row = `<tr>
                <td>${k}</td>
                <td>${prob.toFixed(6)}</td>
                <td>${cumulativeP.toFixed(6)}</td>
            </tr>`;
            tbody.innerHTML += row;
        }
    }

    // 初始生成
    window.onload = generateTable;
</script>

</body>
</html>
