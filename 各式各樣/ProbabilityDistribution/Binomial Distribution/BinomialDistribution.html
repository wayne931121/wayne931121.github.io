<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>二項分佈機率表 (Binomial Distribution Table)</title>
    <style>
        body { font-family: sans-serif; margin: 20px; line-height: 1.6; }
        .container { max-width: 800px; margin: auto; }
        .input-group { margin-bottom: 20px; background: #f4f4f4; padding: 15px; border-radius: 8px; }
        label { margin-right: 10px; font-weight: bold; }
        input { padding: 5px; margin-right: 20px; width: 80px; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 10px; text-align: center; }
        th { background-color: #007bff; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .summary { margin-top: 10px; font-style: italic; color: #555; }
    </style>
</head>
<body>

<div class="container">
    <h1>二項分佈機率表生成器</h1>
    
    <div class="input-group">
        <label for="n-input">試驗次數 (n):</label>
        <input type="number" id="n-input" value="10" min="1" max="100">
        
        <label for="p-input">成功機率 (p):</label>
        <input type="number" id="p-input" value="0.5" min="0" max="1" step="0.01">
        
        <button onclick="generateTable()">生成表格</button>
    </div>

    <div id="result-area">
        <div class="summary" id="stats-summary"></div>
        <table id="distribution-table">
            <thead>
                <tr>
                    <th>成功次數 (k)</th>
                    <th>機率 P(X = k)</th>
                    <th>累積機率 P(X ≤ k)</th>
                </tr>
            </thead>
            <tbody>
                </tbody>
        </table>
    </div>
</div>
<script>
/*
小華投籃100次，每球進球率是0.2。請算出他剛好進0球的機率式子、期望值與標準差。
Probability mass function(M): 100!/(M!(100-M)!)*(0.2^M)*(0.8^(100-M))
Mean = Weighted Average = expected value(M): sigma(M=0~100){M*probability mass function(M)}
Variance: expected value((M-expected value)^2) 
          = sigma(M=0~100){((M-expected value)^2)*probability mass function(M)}
Standard Deviation: Variance^0.5
*/

/*Me and Gemini: 用Javascript寫出一個算出N偕乘的函數，創造binomial distribution table.html*/
function Factorial(n) {
  // 基礎條件：0! 和 1! 都是 1
  if (n === 0 || n === 1) {
    return 1;
  }
  // 遞迴呼叫
  return n * Factorial(n - 1);
}

/*Me : 用javascript寫出排列組合P函數*/
/*排列（Permutation，符號 P）是指從相異元素中取出元素，並考慮順序的排成一列的方法數。*/
function P(N,M) {
  return Factorial(N)/Factorial(N-M);
  /*P(5,2)=5*4*/
}

/*Me : 用javascript寫出排列組合C函數*/
/*組合 (Combination，符號 C) 是指從相異元素中取出元素，不考慮順序的排成一列的方法數。*/
function C(N,M) {
  return P(N,M)/Factorial(M);
  /*C(5,2)=(5*4)/(2!)*/
}

function BinomialDistributionProbabilityMassFunction(Total,Success,Failed,M){
    return C(Total,M)*(Success**M)*(Failed**(Total-M));
}

function BinomialDistributionExpectedValue(Total,Success,Failed,Start,End){
    let sum=0;
	for(let i=Start;i<=End;i++){
	    sum+=i*BinomialDistributionProbabilityMassFunction(Total,Success,Failed,i);
	}
    return sum;
}

function BinomialDistributionVariance(Total,Success,Failed,Start,End){
    let ExpectedValue = BinomialDistributionExpectedValue(Total,Success,Failed,Start,End); 
    let sum=0;
	let P=0;
	for(let i=Start;i<=End;i++){
	    P = BinomialDistributionProbabilityMassFunction(Total,Success,Failed,i);
	    sum+=((i-ExpectedValue)**2)*P;
	}
    return sum;
}

function BinomialDistributionStandardDeviation(Total,Success,Failed,Start,End){
    return BinomialDistributionVariance(Total,Success,Failed,Start,End)**0.5
}

/*
BinomialDistributionExpectedValue(100,0.2,0.8,0,100): 20
BinomialDistributionVariance(100,0.2,0.8,0,100): 16
BinomialDistributionStandardDeviation(100,0.2,0.8,0,100): 4
*/
</script>
<script>
    function generateTable() {
        const n = parseInt(document.getElementById('n-input').value);
        const p = parseFloat(document.getElementById('p-input').value);
        const tbody = document.querySelector('#distribution-table tbody');
        const summary = document.getElementById('stats-summary');
        
        // 清空舊數據
        tbody.innerHTML = '';

        if (isNaN(n) || isNaN(p) || p < 0 || p > 1 || n < 0) {
            alert("請輸入正確的 n (正整數) 與 p (0~1 之間)");
            return;
        }

        let cumulativeP = 0;
        const mean = BinomialDistributionExpectedValue(n,p,1-p,0,n).toFixed(2);
        const variance = BinomialDistributionVariance(n,p,1-p,0,n).toFixed(2);
		const stdev = BinomialDistributionStandardDeviation(n,p,1-p,0,n).toFixed(2);

        summary.innerHTML = `期望值 (E[X]): ${mean} | 變異數 (Var[X]): ${variance} | 標準差 (STDEV[X]): ${stdev}`;

        for (let k = 0; k <= n; k++) {
            const prob = BinomialDistributionProbabilityMassFunction(n,p,1-p,k);
            cumulativeP += prob;

            const row = `<tr>
                <td>${k}</td>
                <td>${prob.toFixed(6)}</td>
                <td>${cumulativeP.toFixed(6)}</td>
            </tr>`;
            tbody.innerHTML += row;
        }
    }

    // 初始生成
    window.onload = generateTable;
</script>

</body>
</html>
